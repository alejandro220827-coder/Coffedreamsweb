<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Dreams</title>

<style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}
.container{
    max-width:430px;
    margin:auto;
    padding:15px;
}
.banner{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:20px;
    margin-bottom:15px;
}
h1{
    text-align:center;
    color:#d7a86e;
    margin:0;
}
.subtitle{
    text-align:center;
    color:#aaa;
    margin-bottom:20px;
}
.card{
    background:#1c1c1c;
    border-radius:20px;
    padding:18px;
    margin-bottom:18px;
    box-shadow:0 0 15px rgba(0,0,0,.35);
}
.product-card{
    background:#222;
    border-radius:18px;
    padding:15px;
    margin-bottom:20px;
}
.product-img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:15px;
    margin-bottom:12px;
}
.product-title{
    font-size:22px;
    color:#f5c389;
}
.description{
    color:#bdbdbd;
    font-size:14px;
    margin-top:8px;
    line-height:1.5;
}
.price{
    color:#d7a86e;
    font-weight:bold;
    margin-top:10px;
    font-size:20px;
}
input,select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:#2a2a2a;
    color:white;
}
button{
    border:none;
    cursor:pointer;
}
.qty-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    margin-top:15px;
}
.qty-btn{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#7a5230;
    color:white;
    font-size:22px;
}
.qty{
    font-size:22px;
}
.add-btn{
    width:100%;
    padding:12px;
    margin-top:12px;
    border-radius:12px;
    background:#7a5230;
    color:white;
    font-weight:bold;
}
.cart-item{
    background:#252525;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
}
.total{
    text-align:right;
    font-size:24px;
    color:#f5c389;
}
.send-btn{
    width:100%;
    padding:16px;
    border-radius:15px;
    background:#d7a86e;
    color:black;
    font-weight:bold;
    font-size:18px;
}
</style>
</head>
<body>

<div class="container">

    <img src="banner.png" class="banner">

    <h1>☕ Coffee Dreams</h1>
    <div class="subtitle">Premium Coffee Experience</div>

    <div class="card">
        <label>Nombre del cliente</label>
        <input id="nombre" placeholder="Escribe tu nombre">
    </div>

    <div class="card">
        <h2>Menú</h2>

        <div class="product-card">
            <img src="cafe-frio.jpg" class="product-img">
            <div class="product-title">Café Frío 16oz</div>
            <div class="description">
                Vaso de 16oz preparado con espresso, leche y hielo.
                Incluye jarabe de elección y foam de elección.
            </div>
            <div class="price">$60</div>

            <select id="jarabe1">
                <option>Vainilla</option>
                <option>Caramel</option>
                <option>Chocolate Blanco</option>
            </select>

            <div class="qty-row">
                <button class="qty-btn" onclick="cambiarCantidad('qty1',-1)">-</button>
                <span class="qty" id="qty1">1</span>
                <button class="qty-btn" onclick="cambiarCantidad('qty1',1)">+</button>
            </div>

            <button class="add-btn" onclick="agregar('Cafe Frio 16oz',60,'jarabe1','qty1')">
                Agregar
            </button>
        </div>

        <div class="product-card">
            <img src="cafe-caliente.png" class="product-img">
            <div class="product-title">Café Caliente 14oz</div>
            <div class="description">
                Vaso de 14oz preparado con espresso y leche vaporizada.
                Incluye jarabe de elección.
            </div>
            <div class="price">$60</div>

            <select id="jarabe2">
                <option>Vainilla</option>
                <option>Caramel</option>
                <option>Chocolate Blanco</option>
            </select>

            <div class="qty-row">
                <button class="qty-btn" onclick="cambiarCantidad('qty2',-1)">-</button>
                <span class="qty" id="qty2">1</span>
                <button class="qty-btn" onclick="cambiarCantidad('qty2',1)">+</button>
            </div>

            <button class="add-btn" onclick="agregar('Cafe Caliente 14oz',60,'jarabe2','qty2')">
                Agregar
            </button>
        </div>
    </div>

    <div class="card">
        <h2>Carrito</h2>
        <div id="cart"></div>
        <div class="total">Total: $<span id="total">0</span></div>
    </div>

    <button class="send-btn" onclick="enviarPedido()">
        Enviar Pedido
    </button>

</div>

<script>
let carrito=[];
let total=0;

function cambiarCantidad(id,cambio){
    let el=document.getElementById(id);
    let valor=parseInt(el.innerText);
    valor += cambio;
    if(valor<1) valor=1;
    el.innerText=valor;
}

function agregar(nombre,precio,jarabeId,qtyId){
    let jarabe=document.getElementById(jarabeId).value;
    let qty=parseInt(document.getElementById(qtyId).innerText);
    let subtotal=precio*qty;

    carrito.push({
        nombre,
        precio,
        qty,
        jarabe,
        subtotal
    });

    total += subtotal;
    renderCart();
}

function renderCart(){
    let cart=document.getElementById("cart");
    cart.innerHTML="";

    carrito.forEach(item=>{
        cart.innerHTML += `
        <div class="cart-item">
            <b>${item.nombre}</b><br>
            Jarabe: ${item.jarabe}<br>
            Cantidad: ${item.qty}<br>
            Subtotal: $${item.subtotal}
        </div>`;
    });

    document.getElementById("total").innerText=total;
}

function enviarPedido(){
    let nombre=document.getElementById("nombre").value;

    if(nombre===""){
        alert("Ingresa tu nombre");
        return;
    }

    if(carrito.length===0){
        alert("Tu carrito está vacío");
        return;
    }

    let mensaje=`☕ NUEVO PEDIDO - COFFEE DREAMS %0A`;
    mensaje += `Cliente: ${nombre}%0A%0A`;

    carrito.forEach((item,i)=>{
        mensaje += `${i+1}) ${item.nombre}%0A`;
        mensaje += `Jarabe: ${item.jarabe}%0A`;
        mensaje += `Cantidad: ${item.qty}%0A`;
        mensaje += `Subtotal: $${item.subtotal}%0A%0A`;
    });

    mensaje += `TOTAL: $${total}`;

    const BOT_TOKEN = "8469323224:AAFoUR9G00us_MPh5QFiIui79jbpgxeZkEU";
    const CHAT_ID = "8290866315";

    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${mensaje}`)
    .then(()=>alert("Pedido enviado"))
    .catch(()=>alert("Error enviando pedido"));
}
</script>

</body>
</html>
