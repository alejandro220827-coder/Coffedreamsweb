
<meta name='viewport' content='width=device-width, initial-scale=1'/><meta name='viewport' content='width=device-width, initial-scale=1'/><meta name='viewport' content='width=device-width, initial-scale=1'/>
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos Café</title>

<style>
body{font-family:Arial;background:#fff8f0;padding:20px;}
h1,h2{text-align:center;color:#8b2e2e;}

form{
max-width:400px;margin:20px auto;padding:20px;background:#fff;
border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
label{display:block;margin-top:10px;font-weight:bold;}
input,select,textarea{
width:100%;padding:8px;margin-top:5px;border-radius:5px;border:1px solid #ccc;
}
button{
background:#8b2e2e;color:white;padding:10px;margin-top:15px;
width:100%;border:none;border-radius:5px;cursor:pointer;
}
button:hover{background:#a13c3c;}

#resumen{
max-width:400px;margin:20px auto;padding:10px;background:#fff4f0;border-radius:8px;
}
.resumen-item{border-bottom:1px solid #ccc;padding:5px 0;}

.telegram-btn{background:#0088cc;}
.telegram-btn:hover{background:#0077b3;}

#banner{
position:fixed;top:-100px;left:50%;transform:translateX(-50%);
background:#28a745;color:white;padding:15px 25px;border-radius:0 0 12px 12px;
font-weight:bold;box-shadow:0 4px 12px rgba(0,0,0,.3);transition:.5s;z-index:9999;
}
#banner.show{top:0;}

#checkAnim{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%) scale(0);
font-size:120px;color:#28a745;
opacity:0;transition:.5s;z-index:9998;
}
#checkAnim.show{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}
</style>
</head>

<body>

<div id="banner">✅ Pedido enviado correctamente</div>
<div id="checkAnim">✔</div>

<h1>Coffe Dreams</h1>
<h2>Solicitud de Producto</h2>

<form id="pedidoForm">

<label>Nombre del cliente</label>
<input type="text" id="nombre" required>

<label>Dirección</label>
<input type="text" id="direccion" required>

<label>Fecha entrega</label>
<input type="date" id="fechaEntrega" required>

<label>Hora entrega</label>
<input type="time" id="horaEntrega" required>

<label>Producto</label>
<select id="producto">
<option value="Café individual">Café individual - $60</option>
<option value="Late oreo">Late oreo - $50</option>
<option value="Cafe caliente">Cafe caliente - $40</option></select>

<label>Cantidad</label>
<input type="number" id="cantidad" value="1" min="1">

<label>Comentarios</label>
<textarea id="comentarios"></textarea>

<button type="button" id="agregarPedido">Agregar Pedido</button>
<button type="button" id="enviarPedidos" class="telegram-btn">Enviar Pedido</button>

</form>

<div id="resumen"></div>

<audio id="ding" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4017b1d3b7.mp3?filename=success-1-6297.mp3"></audio>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxNes97vClzV8lQqXfAynOxHo2nwFYDUXzDmomqvT8u_ACAnBtClKct1C7_u0SNl735bw/exec";
const TELEGRAM_TOKEN="8469323224:AAFoUR9G00us_MPh5QFiIui79jbpgxeZkEU";
const TELEGRAM_CHAT_ID="8290866315";

let pedidosTemp=[];

const hoy=new Date().toISOString().split("T")[0];
document.getElementById("fechaEntrega").min=hoy;

function calcularTotal(p,c){
let precio=0;
if(p==="Café individual")precio=60;
if(p==="Late oreo")precio=50;
if(p==="Cafe caliente")precio=40;
return precio*c;
}

function actualizarResumen(){
const div=document.getElementById("resumen");
if(!pedidosTemp.length){div.innerHTML="";return;}

let html="<h3>Resumen:</h3>";
pedidosTemp.forEach((p,i)=>{
html+=`
<div class="resumen-item">
${i+1}. <b>${p.nombre}</b> - ${p.producto} x${p.cantidad} → $${p.total}<br>
📅 ${p.fechaEntrega} ⏰ ${p.horaEntrega}<br>
📍 ${p.direccion}<br>
<button onclick="eliminarTemp(${i})">Eliminar</button>
</div>`;
});
div.innerHTML=html;
}

function eliminarTemp(i){
pedidosTemp.splice(i,1);
actualizarResumen();
}

document.getElementById("agregarPedido").addEventListener("click",()=>{

const nombre=document.getElementById("nombre").value.trim();
const direccion=document.getElementById("direccion").value.trim();
const fecha=document.getElementById("fechaEntrega").value;
const hora=document.getElementById("horaEntrega").value;

if(pedidosTemp.length===0 && (!nombre || !direccion || !fecha || !hora)){
alert("Completa datos primero");
return;
}

const prod=document.getElementById("producto").value;
const cant=parseInt(document.getElementById("cantidad").value);
const com=document.getElementById("comentarios").value;
const total=calcularTotal(prod,cant);

const cliente=pedidosTemp.length
? pedidosTemp[0]
: {nombre,direccion,fechaEntrega:fecha,horaEntrega:hora};

pedidosTemp.push({
nombre:cliente.nombre,
direccion:cliente.direccion,
fechaEntrega:cliente.fechaEntrega,
horaEntrega:cliente.horaEntrega,
producto:prod,
cantidad:cant,
comentarios:com,
total
});

actualizarResumen();
document.getElementById("cantidad").value=1;
document.getElementById("comentarios").value="";
});

function efectosExito(){
document.getElementById("banner").classList.add("show");
document.getElementById("checkAnim").classList.add("show");
document.getElementById("ding").play();

if(navigator.vibrate)
navigator.vibrate([200,100,200]);

setTimeout(()=>{
document.getElementById("banner").classList.remove("show");
document.getElementById("checkAnim").classList.remove("show");
},3000);
}

document.getElementById("enviarPedidos").addEventListener("click",()=>{

if(!pedidosTemp.length){alert("No hay pedidos");return;}
if(!confirm("¿Enviar pedido?"))return;

Promise.all(pedidosTemp.map(p=>fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify(p)
})))
.then(async()=>{

let msg="🛒 NUEVO PEDIDO\n\n";
pedidosTemp.forEach((p,i)=>{
msg+=`${i+1}. ${p.producto} x${p.cantidad} - $${p.total}\n`;
if(i===0)
msg+=`👤 ${p.nombre}\n📍 ${p.direccion}\n📅 ${p.fechaEntrega} ⏰ ${p.horaEntrega}\n`;
msg+="\n";
});

await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({chat_id:TELEGRAM_CHAT_ID,text:msg})
});

efectosExito();
pedidosTemp=[];
actualizarResumen();
document.getElementById("pedidoForm").reset();
document.getElementById("fechaEntrega").min=hoy;

});
});
</script>

</body>
</html>
